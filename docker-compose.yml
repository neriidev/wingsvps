# Edita o bloco abaixo (URL do painel, ptla_, ID do node, FQDN). Não commits com token real em repositório público.
x-wings-env: &wings-env
  WINGS_PANEL_URL: "https://panel.vulkan.ninja"
  WINGS_APP_API_TOKEN: "ptla_StET8dM982N0FqSKiElvEObxSYQScsbeIPXrh9gPoLk"
  WINGS_NODE_ID: "3"
  WINGS_FORCE_CONFIGURE: "0"
  WINGS_BEHIND_CADDY: "1"

x-caddy-env: &caddy-env
  WINGS_FQDN: "srv2.vulkan.ninja"
  # Caddyfile remoto (https://...). Vazio = usa caddy/Caddyfile montado em /caddy-data/Caddyfile.
  CADDYFILE_URL: "https://raw.githubusercontent.com/neriidev/wingsvps/main/caddy/Caddyfile"

# MySQL para plugins dos servidores (LuckyPerms, etc.). Edita senhas antes de subir.
x-mysql-env: &mysql-env
  MYSQL_ROOT_PASSWORD: "plugins"
  MYSQL_DATABASE: "plugins"
  MYSQL_USER: "plugins"
  MYSQL_PASSWORD: "plugins"

# Wings + Caddy — caminhos no host alinham com o Docker daemon para os game servers.
services:
  wings:
    build:
      context: ./wings-docker
      args:
        WINGS_VERSION: 1.12.1
    restart: unless-stopped
    network_mode: host
    environment:
      <<: *wings-env
    volumes:
      - /etc/pterodactyl:/etc/pterodactyl
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /var/log/pterodactyl:/var/log/pterodactyl
      - /run/wings:/run/wings
      - /var/run/docker.sock:/var/run/docker.sock

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    depends_on:
      - wings
    environment:
      <<: *caddy-env
    command: []
    volumes:
      # Opcional: Caddyfile local quando CADDYFILE_URL está vazio. O run.sh vem da imagem (build).
      - ./caddy:/caddy-data:ro
      - caddy_data:/data
      - caddy_config:/config

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      <<: *mysql-env
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      # Game servers (contentores) ligam ao IP do host:3306 — ex. 172.17.0.1 em Linux (bridge).
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
